<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jastip Clouds - Launching Soon</title>

  <!-- Pixel Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(180deg, #0ea5e9, #0284c7);
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
    }

    .container {
      text-align: center;
      color: white;
    }

    .logo-text {
      width: 420px;
      margin-bottom: 20px;
    }

    .illustration {
      width: 500px;
      max-width: 90%;
      margin-bottom: 30px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .launching {
      font-size: 16px;
      color: #e0f2fe;
      text-shadow:
        2px 2px 0 #0284c7,
        4px 4px 0 #0369a1;
      margin-top: 10px;
    }

    .badge {
      margin-top: 20px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      display: inline-block;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .logo-text {
        width: 300px;
      }

      .illustration {
        width: 320px;
      }

      .launching {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO TEXT -->
    <img src="https://i.ibb.co/spGD09wk/03.png" alt="Jastip Clouds" class="logo-text">

    <!-- MAIN ILLUSTRATION -->
    <img src="https://i.ibb.co/YJktvxc/02.png" alt="Jastip Illustration" class="illustration">

    <!-- LAUNCHING TEXT -->
    <div class="badge">
      <div class="launching">LAUNCHING SOON</div>
    </div>

  </div>

</body>
</html>
