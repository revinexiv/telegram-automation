events {
    worker_connections 1024;
}

http {
    # Rate limiting untuk keamanan
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ─── HTTP → HTTPS Redirect (aktif setelah SSL) ───────────────────────
    server {
        listen 80;
        server_name _;                          # Ganti dengan domain kamu

        # Untuk certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect ke HTTPS jika sudah punya domain + SSL
        # Uncomment setelah setup SSL:
        # location / {
        #     return 301 https://$host$request_uri;
        # }

        # Tanpa SSL: langsung proxy ke app
        location / {
            proxy_pass http://tg-auto:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # ─── HTTPS (aktifkan setelah dapat SSL certificate) ──────────────────
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;         # Ganti dengan domain kamu

    #     ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    #     # Security headers
    #     add_header Strict-Transport-Security "max-age=31536000" always;
    #     add_header X-Frame-Options DENY;
    #     add_header X-Content-Type-Options nosniff;

    #     location / {
    #         limit_req zone=api burst=10 nodelay;
    #         proxy_pass http://tg-auto:8000;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_read_timeout 300s;
    #     }
    # }
}
